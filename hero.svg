<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-monospace,'JetBrains Mono',Menlo,Consolas,monospace">
  <title>The Stateless Storefront — architecture at a glance</title>
  <defs>
    <marker id="hv" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#7fdbff"/>
    </marker>
  </defs>

  <!-- canvas -->
  <rect width="1200" height="400" fill="#000000"/>

  <!-- faint blueprint grid -->
  <g stroke="#d8dee8" stroke-opacity="0.05" stroke-width="1">
    <line x1="112" y1="16" x2="112" y2="384"/>
    <line x1="240" y1="16" x2="240" y2="384"/>
    <line x1="368" y1="16" x2="368" y2="384"/>
    <line x1="496" y1="16" x2="496" y2="384"/>
    <line x1="624" y1="16" x2="624" y2="384"/>
    <line x1="752" y1="16" x2="752" y2="384"/>
    <line x1="880" y1="16" x2="880" y2="384"/>
    <line x1="1008" y1="16" x2="1008" y2="384"/>
    <line x1="16" y1="112" x2="1184" y2="112"/>
    <line x1="16" y1="240" x2="1184" y2="240"/>
  </g>

  <!-- frame + corner ticks -->
  <rect x="16" y="16" width="1168" height="368" fill="none" stroke="#34343c" stroke-width="1"/>
  <g stroke="#7fdbff" stroke-width="2" fill="none">
    <path d="M16 36 L16 16 L36 16"/>
    <path d="M1184 36 L1184 16 L1164 16"/>
    <path d="M16 364 L16 384 L36 384"/>
    <path d="M1184 364 L1184 384 L1164 384"/>
  </g>

  <!-- header text -->
  <text x="48" y="86" font-size="14" letter-spacing="6" fill="#ffb454">INFRASTRUCTURE · BUILD NOTES · BLUEPRINT</text>
  <text x="46" y="160" font-size="56" font-weight="800" letter-spacing="-1">
    <tspan fill="#eaeef6">THE </tspan><tspan fill="#7fdbff">STATELESS</tspan><tspan fill="#eaeef6"> STOREFRONT</tspan>
  </text>
  <text x="50" y="198" font-size="17" fill="#8b909d">pay · prove · watermark · hand back — built so the box that runs your code is disposable</text>
  <text x="1152" y="86" text-anchor="end" font-size="13" fill="#6f86b8">Ajai Raj · iolinked.com</text>

  <!-- schematic strip -->
  <circle cx="74" cy="310" r="16" fill="#0a0a0d" stroke="#7fdbff" stroke-width="1.5"/>
  <circle cx="74" cy="304" r="5" fill="#7fdbff"/>
  <path d="M62 322 q12 -12 24 0" fill="none" stroke="#7fdbff" stroke-width="1.6"/>
  <text x="74" y="350" text-anchor="middle" font-size="11" fill="#6f86b8">BUYER</text>
  <line x1="92" y1="310" x2="136" y2="310" stroke="#7fdbff" stroke-width="2" marker-end="url(#hv)"/>

  <!-- app box -->
  <rect x="140" y="264" width="360" height="92" rx="11" fill="#101016" stroke="#7fdbff" stroke-width="2"/>
  <text x="320" y="298" text-anchor="middle" font-size="15" font-weight="700" fill="#7fdbff">TRAEFIK · APP</text>
  <text x="320" y="320" text-anchor="middle" font-size="13" fill="#eaeef6">Next.js + Payload</text>
  <text x="320" y="343" text-anchor="middle" font-size="13" letter-spacing="1" fill="#ffb454">« STATE LIVES NOWHERE »</text>

  <!-- chips -->
  <g>
    <rect x="560" y="266" width="580" height="26" rx="7" fill="#0a0a0d" stroke="#6be58b" stroke-width="1.3"/>
    <text x="574" y="284" font-size="13" fill="#eaeef6">DATABASE</text>
    <text x="720" y="284" font-size="12" fill="#8b909d">orders · entitlements · uses-left · expiry</text>

    <rect x="560" y="300" width="580" height="26" rx="7" fill="#0a0a0d" stroke="#6be58b" stroke-width="1.3"/>
    <text x="574" y="318" font-size="13" fill="#eaeef6">OBJECT STORE</text>
    <text x="720" y="318" font-size="12" fill="#8b909d">master PDFs (private) · watermarked output · media</text>

    <rect x="560" y="334" width="580" height="26" rx="7" fill="#0a0a0d" stroke="#b69cff" stroke-width="1.3"/>
    <text x="574" y="352" font-size="13" fill="#eaeef6">STRIPE</text>
    <text x="720" y="352" font-size="12" fill="#8b909d">the money — card never touches your server</text>
  </g>

  <!-- fan arrows app -> chips -->
  <g stroke-width="1.6" fill="none">
    <path d="M500 304 C 534 290, 540 279, 556 279" stroke="#6be58b" marker-end="url(#hv)"/>
    <path d="M500 310 C 534 312, 540 313, 556 313" stroke="#6be58b" marker-end="url(#hv)"/>
    <path d="M500 316 C 534 334, 540 347, 556 347" stroke="#b69cff" marker-end="url(#hv)"/>
  </g>

  <text x="320" y="378" text-anchor="middle" font-size="11" fill="#6f86b8">disposable — kill it, rebuild it</text>
  <text x="850" y="378" text-anchor="middle" font-size="11" fill="#6f86b8">external state — the only thing you carry between hosts</text>
</svg>
